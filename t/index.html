<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>鸡兔同笼 - 动画演示</title>
    <script src="./gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: 'PingFang SC', 'Hiragino Sans GB', system-ui, sans-serif;
            touch-action: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* === 场景 === */
        .scene {
            width: 100%; height: 100%;
            position: relative;
            background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 40%, #98D8A0 60%, #5DAE5F 65%, #4A9E4A 100%);
            overflow: hidden;
        }
        .scene.drag-active { overflow: visible; }

        /* 天空装饰 */
        .sun {
            position: absolute;
            top: 8%; right: 12%;
            width: 70px; height: 70px;
            background: radial-gradient(circle, #FFE87C 30%, #FFD700 70%, transparent 72%);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255,215,0,0.5), 0 0 80px rgba(255,215,0,0.2);
            animation: sunPulse 3s ease-in-out infinite;
        }
        @keyframes sunPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(255,215,0,0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(255,215,0,0.7); }
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.9;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .cloud::before, .cloud::after {
            content: ''; position: absolute;
            background: white; border-radius: 50%;
        }
        .cloud-1 { width: 100px; height: 35px; top: 10%; left: 10%; animation: cloudFloat 20s linear infinite; }
        .cloud-1::before { width: 45px; height: 45px; top: -20px; left: 15px; }
        .cloud-1::after { width: 55px; height: 50px; top: -25px; left: 40px; }
        .cloud-2 { width: 130px; height: 40px; top: 18%; left: 55%; animation: cloudFloat 25s linear infinite 5s; }
        .cloud-2::before { width: 55px; height: 50px; top: -22px; left: 20px; }
        .cloud-2::after { width: 65px; height: 55px; top: -30px; left: 55px; }
        .cloud-3 { width: 80px; height: 28px; top: 6%; left: 35%; animation: cloudFloat 18s linear infinite 10s; }
        .cloud-3::before { width: 35px; height: 35px; top: -15px; left: 10px; }
        .cloud-3::after { width: 45px; height: 40px; top: -20px; left: 30px; }
        @keyframes cloudFloat {
            0% { transform: translateX(0); }
            100% { transform: translateX(100vw); }
        }

        /* 草地 */
        .ground {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 42%;
            background: linear-gradient(180deg, #5DAE5F 0%, #4A9E4A 30%, #3D8B3D 100%);
            border-radius: 50% 50% 0 0 / 12% 12% 0 0;
        }
        .ground::before {
            content: '';
            position: absolute;
            top: -8px; left: 0; right: 0;
            height: 20px;
            background: repeating-linear-gradient(90deg, transparent, transparent 8px, #6BC06B 8px, #6BC06B 10px);
            opacity: 0.4;
        }

        /* 小草装饰 */
        .grass-decor {
            position: absolute;
            width: 20px; height: 30px;
            border-left: 3px solid #4CAF50;
            border-radius: 0 0 0 80%;
            transform-origin: bottom center;
            animation: grassSway 2.5s ease-in-out infinite;
            z-index: 1;
            pointer-events: none;
        }
        .grass-decor::before {
            content: '';
            position: absolute;
            left: -3px; top: 8px;
            width: 16px; height: 22px;
            border-right: 3px solid #66BB6A;
            border-radius: 0 80% 0 0;
        }
        .g1 { bottom: 34%; left: 6%; animation-delay: 0s; }
        .g2 { bottom: 33%; right: 8%; animation-delay: 0.8s; }
        .g3 { bottom: 35%; left: 50%; animation-delay: 1.6s; }
        @keyframes grassSway {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
        }

        /* 小花装饰 */
        .flower-decor {
            position: absolute;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: radial-gradient(circle, #FFD700 30%, #FF6B6B 32%, #FF6B6B 100%);
            animation: flowerBob 3s ease-in-out infinite;
            z-index: 1;
            pointer-events: none;
        }
        .flower-decor::before {
            content: '';
            position: absolute;
            top: 14px; left: 5px;
            width: 3px; height: 16px;
            background: #4CAF50;
            border-radius: 2px;
        }
        .f1 { bottom: 36%; left: 15%; }
        .f2 { bottom: 37%; right: 18%; animation-delay: 1.5s; }
        @keyframes flowerBob {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-3px) rotate(5deg); }
        }

        /* 栅栏 */
        .fence {
            position: absolute;
            top: 44%; left: 5%; right: 5%;
            transform: translateY(0%);
            height: 60px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 12px;
        }
        .fence-post {
            width: 14px; height: 55px;
            background: linear-gradient(90deg, #D4A76A 0%, #C4975A 50%, #B8894E 100%);
            border-radius: 4px 4px 0 0;
            position: relative;
            box-shadow: 1px 2px 3px rgba(0,0,0,0.2);
        }
        .fence-post::before {
            content: '';
            position: absolute; top: -8px; left: 50%;
            transform: translateX(-50%);
            width: 18px; height: 10px;
            background: #D4A76A;
            border-radius: 5px 5px 0 0;
        }
        .fence-rail {
            position: absolute;
            left: 0; right: 0;
            height: 8px;
            background: linear-gradient(180deg, #D4A76A, #C4975A);
            border-radius: 3px;
            box-shadow: 0 2px 3px rgba(0,0,0,0.15);
        }
        .fence-rail-1 { top: 10px; }
        .fence-rail-2 { top: 32px; }

        /* === 动物舞台 === */
        .stage {
            position: absolute;
            top: 45%; left: 3%; right: 3%;
            transform: translateY(-20%);
            height: 30%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            padding: 0 10px;
            align-content: flex-end;
            z-index: 10;
            overflow: visible;
        }
        .stage.drag-mode { z-index: 55; }
        @media (max-width: 480px) {
            .stage { height: 28%; gap: 3px; left: 2%; right: 2%; }
        }
        @media (max-height: 500px) {
            .stage { height: 30%; }
        }

        /* === 动物角色 === */
        .animal-char {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            transform-origin: bottom center;
        }
        .animal-char svg {
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.2));
            width: 54px;
            height: 65px;
        }
        @media (max-width: 480px) {
            .animal-char svg { width: 42px; height: 50px; }
        }
        @media (max-width: 360px) {
            .animal-char svg { width: 34px; height: 42px; }
        }
        .chicken-char { animation: chickenIdle 2s ease-in-out infinite; }
        .rabbit-char { animation: rabbitIdle 2.5s ease-in-out infinite; }
        @keyframes chickenIdle {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-2deg); }
        }
        @keyframes rabbitIdle {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.03); }
        }
        .question-char {
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.2));
        }
        .question-char svg {
            width: 54px; height: 65px;
        }
        @media (max-width: 480px) {
            .question-char svg { width: 42px; height: 50px; }
        }
        @media (max-width: 360px) {
            .question-char svg { width: 34px; height: 42px; }
        }

        /* === 对话气泡 === */
        .bubble-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 50;
        }
        .speech-bubble {
            position: absolute;
            background: white;
            border-radius: 18px;
            border: 3px solid #F0E6D3;
            padding: 16px 20px;
            font-size: 1rem;
            line-height: 1.7;
            color: #333;
            box-shadow: 0 6px 25px rgba(0,0,0,0.12), inset 0 -2px 0 rgba(0,0,0,0.03);
            opacity: 0;
            transform: scale(0.8);
            max-width: min(92%, 540px);
            width: max-content;
            text-align: center;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        .speech-bubble::after { display: none; }
        .speech-bubble.top-bubble {
            top: calc(90px + env(safe-area-inset-top, 0px)); left: 50%;
            transform: translateX(-50%) scale(0.8);
        }
        .speech-bubble.top-bubble.show {
            transform: translateX(-50%) scale(1);
            opacity: 1;
        }
        .speech-bubble.center-bubble {
            top: calc(90px + env(safe-area-inset-top, 0px)); left: 50%;
            transform: translateX(-50%) scale(0.8);
        }
        .speech-bubble.center-bubble.show {
            transform: translateX(-50%) scale(1);
            opacity: 1;
        }
        .speech-bubble .highlight { color: #E74C3C; font-weight: bold; }
        .speech-bubble .accent { color: #2ECC71; font-weight: bold; }
        .speech-bubble .formula {
            font-family: 'Courier New', monospace;
            background: #f0f7ff;
            padding: 4px 8px;
            border-radius: 8px;
            display: inline-block;
            margin: 3px 0;
            color: #2C3E50;
            font-weight: bold;
            font-size: 1rem;
            word-break: keep-all;
        }
        .speech-bubble .title-text {
            font-size: 1.3rem;
            font-weight: 900;
            color: #E67E22;
            text-shadow: 0 2px 0 rgba(0,0,0,0.05);
            letter-spacing: 2px;
        }
        .speech-bubble .sub-text {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 4px;
        }

        /* 移动端气泡调整 */
        @media (max-width: 480px) {
            .speech-bubble {
                padding: 12px 16px;
                font-size: 0.95rem;
                line-height: 1.6;
                border-radius: 14px;
                max-width: 92%;
            }
            .speech-bubble .title-text { font-size: 1.2rem; }
            .speech-bubble .formula { font-size: 0.9rem; padding: 3px 6px; }
            .speech-bubble .sub-text { font-size: 0.85rem; }
            .speech-bubble.top-bubble { top: calc(80px + env(safe-area-inset-top, 0px)); }
            .speech-bubble.center-bubble { top: calc(80px + env(safe-area-inset-top, 0px)); }
        }
        @media (max-width: 360px) {
            .speech-bubble { font-size: 0.9rem; padding: 10px 12px; }
            .speech-bubble .title-text { font-size: 1.1rem; }
        }
        /* 横屏 */
        @media (max-height: 500px) {
            .speech-bubble { padding: 10px 14px; font-size: 0.85rem; }
            .speech-bubble.top-bubble { top: calc(60px + env(safe-area-inset-top, 0px)); }
            .speech-bubble.center-bubble { top: calc(60px + env(safe-area-inset-top, 0px)); }
            .speech-bubble .title-text { font-size: 1.1rem; }
        }

        /* === 烟雾效果 === */
        .poof {
            position: absolute;
            pointer-events: none;
            z-index: 60;
        }
        .poof-particle {
            position: absolute;
            border-radius: 50%;
            background: white;
            opacity: 0;
        }

        /* === 浮动数字 === */
        .float-num {
            position: absolute;
            font-size: 1.3rem;
            font-weight: bold;
            color: #E74C3C;
            pointer-events: none;
            z-index: 70;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* === HUD 控制 === */
        .game-hud {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom, 0px));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: nowrap;
            gap: 10px;
            align-items: center;
            z-index: 200;
            background: rgba(255,255,255,0.95);
            padding: 10px 20px;
            border-radius: 30px;
            border: 3px solid #E8DCC8;
            box-shadow: 0 4px 0 rgba(0,0,0,0.08), 0 8px 25px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }
        .game-hud.hidden { opacity: 0; pointer-events: none; transition: opacity 0.4s; }
        .hud-item {
            display: flex; align-items: center; gap: 6px;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .hud-item label { font-size: 13px; color: #666; white-space: nowrap; flex-shrink: 0; }
        .hud-item .num { font-size: 20px; font-weight: bold; color: #2C3E50; min-width: 28px; text-align: center; }
        .hud-item .adj {
            width: 34px; height: 34px;
            border-radius: 50%;
            border: 2px solid #D4C8B8;
            background: linear-gradient(180deg, #FFF 0%, #F0EAE0 100%);
            color: #555;
            font-size: 18px;
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }
        .hud-item .adj:active { transform: translateY(2px); box-shadow: none; background: #EDE6DC; }
        .play-btn {
            padding: 10px 24px;
            border: 3px solid #CC4422;
            border-radius: 25px;
            background: linear-gradient(180deg, #FF7B5B 0%, #ee5a24 100%);
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #B84420, 0 6px 15px rgba(255,107,107,0.3);
            transition: all 0.1s;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
        .play-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #B84420, 0 2px 6px rgba(255,107,107,0.3); }
        .play-btn:disabled { opacity: 0.5; animation: none; }
        @keyframes btnPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .play-btn:not(:disabled) { animation: btnPulse 2s ease-in-out infinite; }

        .reset-hud {
            position: fixed;
            top: calc(16px + env(safe-area-inset-top, 0px));
            right: 16px;
            z-index: 200;
            display: none;
        }
        .reset-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 2px solid #C4B8A8;
            background: linear-gradient(180deg, #FFF 0%, #F5EEE6 100%);
            color: #666;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.08);
        }
        .reset-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.08); }

        /* === 静音按钮 === */
        .mute-hud {
            position: fixed;
            top: calc(16px + env(safe-area-inset-top, 0px));
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
        }
        .mute-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 2px solid #C4B8A8;
            background: linear-gradient(180deg, #FFF 0%, #F5EEE6 100%);
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 3px 0 rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.08);
            display: flex; align-items: center; justify-content: center;
        }
        .mute-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.08); }

        /* === 脚数指示器 === */
        .legs-hud {
            position: fixed;
            top: calc(16px + env(safe-area-inset-top, 0px));
            left: 16px;
            z-index: 200;
            background: linear-gradient(180deg, #FFF 0%, #F5EEE6 100%);
            border: 2px solid #E8DCC8;
            padding: 8px 16px;
            border-radius: 20px;
            box-shadow: 0 3px 0 rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.06);
            font-size: 14px;
            font-weight: 500;
            color: #555;
            display: none;
        }
        .legs-hud .legs-val { font-weight: bold; color: #E74C3C; font-size: 18px; }
        .legs-hud .legs-target { color: #999; }

        /* === 进度条 === */
        .progress-bar {
            position: fixed;
            top: calc(52px + env(safe-area-inset-top, 0px));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            align-items: center;
            z-index: 200;
            padding: 6px 14px;
            background: rgba(255,255,255,0.85);
            border-radius: 20px;
            border: 2px solid #E8DCC8;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .progress-bar.visible { opacity: 1; }
        .progress-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #DDD;
            transition: all 0.3s;
        }
        .progress-dot.active { background: #FF7B5B; transform: scale(1.3); }
        .progress-dot.done { background: #2ECC71; }

        /* === 交互面板 === */
        .interact-panel {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom, 0px));
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            max-width: min(95%, 560px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
        }
        .interact-panel.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .interact-btn {
            padding: 12px 24px;
            border-radius: 25px;
            border: 3px solid #D4C8B8;
            background: linear-gradient(180deg, #FFF 0%, #F5EEE6 100%);
            color: #444;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.08), 0 6px 15px rgba(0,0,0,0.08);
            transition: all 0.15s;
            min-width: 100px;
            text-align: center;
        }
        .interact-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.08); }
        .interact-btn.primary {
            border-color: #CC4422;
            background: linear-gradient(180deg, #FF7B5B 0%, #ee5a24 100%);
            color: white;
            box-shadow: 0 4px 0 #B84420, 0 6px 15px rgba(255,107,107,0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            animation: btnPulse 2s ease-in-out infinite;
        }
        .interact-btn.correct {
            border-color: #27ae60;
            background: linear-gradient(180deg, #6DD5A0 0%, #2ECC71 100%);
            color: white;
            box-shadow: 0 4px 0 #1e8449;
            animation: none;
            transform: scale(1.05);
        }
        .interact-btn.wrong {
            border-color: #e74c3c;
            background: linear-gradient(180deg, #FF8888 0%, #e74c3c 100%);
            color: white;
            box-shadow: 0 4px 0 #c0392b;
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .interact-hint {
            width: 100%;
            text-align: center;
            font-size: 13px;
            color: #E74C3C;
            font-weight: 500;
            margin-top: -4px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .interact-hint.visible { opacity: 1; }

        /* 滑块 */
        .interact-slider-wrap {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 0 10px;
        }
        .interact-slider-wrap input[type="range"] {
            width: 80%;
            max-width: 280px;
            height: 8px;
            -webkit-appearance: none;
            appearance: none;
            background: #E8DCC8;
            border-radius: 4px;
            outline: none;
        }
        .interact-slider-wrap input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: linear-gradient(180deg, #FF7B5B, #ee5a24);
            border: 3px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            cursor: grab;
        }
        .interact-slider-val {
            font-size: 22px;
            font-weight: bold;
            color: #ee5a24;
        }

        /* 放置计数器 */
        .interact-counter {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .interact-btn { padding: 10px 16px; font-size: 13px; min-width: 80px; }
            .progress-dot { width: 8px; height: 8px; }
            .progress-bar { gap: 4px; padding: 5px 10px; }
        }

        /* === 魔法圈 (拖拽目标) === */
        .magic-zone {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 140px; height: 55px;
            border-radius: 50%;
            border: 3px dashed #9B59B6;
            background: radial-gradient(ellipse, rgba(155,89,182,0.15) 0%, transparent 70%);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 56;
            animation: magicPulse 1.5s ease-in-out infinite;
        }
        .magic-zone.visible { display: flex; }
        .magic-zone-label {
            font-size: 12px;
            color: #9B59B6;
            font-weight: bold;
            text-align: center;

<script>
// ============================================================
// === 音频系统 ===
// ============================================================
const AudioManager = (() => {
    let ctx = null;
    let isMuted = false;
    let bgmGain = null;
    let bgmOscillators = [];
    let currentNarration = null; // 当前播放的旁白 Audio 元素

    // 预录音频文件映射
    const audioFiles = {
        '01_title': 'audio/01_title.mp3',
        '02_question': 'audio/02_question.mp3',
        '03_assume': 'audio/03_assume.mp3',
        '04_count': 'audio/04_count.mp3',
        '05_reason': 'audio/05_reason.mp3',
        '06_transform': 'audio/06_transform.mp3',
        '07_result': 'audio/07_result.mp3',
        '08_verify': 'audio/08_verify.mp3',
        '09_summary': 'audio/09_summary.mp3'
    };
    const audioCache = {}; // 预加载缓存

    function init() {
        if (ctx) return;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') ctx.resume();
        // 预加载所有旁白音频
        preloadAudio();
    }

    function preloadAudio() {
        Object.entries(audioFiles).forEach(([key, src]) => {
            const audio = new Audio();
            audio.preload = 'auto';
            audio.src = src;
            audioCache[key] = audio;
        });
    }

    function getMuted() { return isMuted; }
    function toggleMute() {
        isMuted = !isMuted;
        if (isMuted) {
            if (currentNarration) { currentNarration.pause(); currentNarration = null; }
            stopBGM();
        }
        const waves = document.getElementById('mute-waves');
        if (isMuted) {
            waves.setAttribute('d', '');
            waves.parentElement.insertAdjacentHTML('beforeend', '<line id="mute-x" x1="18" y1="6" x2="22" y2="18" stroke="#E74C3C" stroke-width="2.5"/>');
        } else {
            waves.setAttribute('d', 'M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14');
            const x = document.getElementById('mute-x');
            if (x) x.remove();
        }
    }

    // --- 音效合成 ---
    function playSfx(type) {
        if (isMuted || !ctx) return;
        if (ctx.state === 'suspended') ctx.resume();
        switch(type) {
            case 'pop': playPop(); break;
            case 'whoosh': playWhoosh(); break;
            case 'ding': playDing(); break;
            case 'click': playClick(); break;
            case 'tada': playTada(); break;
        }
    }

    function playPop() {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
        osc.connect(gain).connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.12);
    }

    function playWhoosh() {
        const bufferSize = ctx.sampleRate * 0.2;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1);
        const src = ctx.createBufferSource();
        src.buffer = buffer;
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.setValueAtTime(1000, ctx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.2);
        filter.Q.value = 2;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
        src.connect(filter).connect(gain).connect(ctx.destination);
        src.start(); src.stop(ctx.currentTime + 0.25);
    }

    function playDing() {
        [880, 1320].forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.15, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
            osc.connect(gain).connect(ctx.destination);
            osc.start(ctx.currentTime + i * 0.05);
            osc.stop(ctx.currentTime + 0.35);
        });
    }

    function playClick() {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.value = 1000;
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.025);
        osc.connect(gain).connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.025);
    }

    function playTada() {
        const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
        notes.forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.12);
            gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + i * 0.12 + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.4);
            osc.connect(gain).connect(ctx.destination);
            osc.start(ctx.currentTime + i * 0.12);
            osc.stop(ctx.currentTime + i * 0.12 + 0.4);
        });
    }

    // --- 背景音乐 (简易五声音阶旋律) ---
    function startBGM() {
        if (isMuted || !ctx) return;
        if (bgmOscillators.length) return; // already playing
        if (ctx.state === 'suspended') ctx.resume();
        bgmGain = ctx.createGain();
        bgmGain.gain.value = 0.2;
        bgmGain.connect(ctx.destination);

        // 五声音阶旋律 (C D E G A) - 轻快活泼
        const melody = [523, 587, 659, 784, 880, 784, 659, 587, 523, 659, 784, 880, 1047, 880, 784, 659];
        const noteDur = 0.35;

        function playLoop() {
            if (isMuted || !bgmGain) return;
            const now = ctx.currentTime;
            melody.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const noteGain = ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = freq;
                const startTime = now + i * noteDur;
                noteGain.gain.setValueAtTime(0.25, startTime);
                noteGain.gain.setValueAtTime(0.12, startTime + noteDur * 0.6);
                noteGain.gain.linearRampToValueAtTime(0.001, startTime + noteDur * 0.95);
                osc.connect(noteGain).connect(bgmGain);
                osc.start(startTime);
                osc.stop(startTime + noteDur);
                bgmOscillators.push(osc);
            });
            // Schedule next loop
            const loopDur = melody.length * noteDur;
            bgmLoopTimer = setTimeout(playLoop, loopDur * 1000 - 100);
        }
        playLoop();
    }

    let bgmLoopTimer = null;
    function stopBGM() {
        if (bgmLoopTimer) { clearTimeout(bgmLoopTimer); bgmLoopTimer = null; }
        bgmOscillators.forEach(o => { try { o.stop(); } catch(e){} });
        bgmOscillators = [];
        if (bgmGain) { bgmGain.disconnect(); bgmGain = null; }
    }

    function duckBGM(duck = true) {
        if (!bgmGain) return;
        bgmGain.gain.linearRampToValueAtTime(duck ? 0.05 : 0.2, ctx.currentTime + 0.2);
    }

    // --- 旁白播放（预录音频） ---
    function speak(key) {
        return new Promise((resolve) => {
            if (isMuted) { resolve(); return; }
            const audio = audioCache[key];
            if (!audio) { resolve(); return; }
            if (currentNarration) { currentNarration.pause(); currentNarration.currentTime = 0; }
            audio.currentTime = 0;
            currentNarration = audio;
            duckBGM(true);
            const done = () => { currentNarration = null; duckBGM(false); resolve(); };
            audio.onended = done;
            audio.onerror = done;
            audio.play().catch(done);
        });
    }

    function stopNarration() {
        if (currentNarration) { currentNarration.pause(); currentNarration.currentTime = 0; currentNarration = null; }
        duckBGM(false);
    }

    return { init, toggleMute, getMuted, playSfx, speak, startBGM, stopBGM, stopNarration };
})();

function solve(h, l) {
    const r = (l - 2 * h) / 2;
    const c = h - r;
    if (r < 0 || c < 0 || !Number.isInteger(r) || !Number.isInteger(c)) return null;
    return { chickens: c, rabbits: r };
}

// === 气泡系统 ===
let activeBubbles = [];

function showBubble(html, opts = {}) {
    const { pos = 'top', duration = 0, big = false } = opts;
    const bubble = document.createElement('div');
    bubble.className = `speech-bubble ${pos}-bubble`;
    bubble.innerHTML = html;
    if (big) bubble.style.fontSize = '1.3rem';
    bubbles.appendChild(bubble);
    activeBubbles.push(bubble);

    return new Promise(resolve => {
        requestAnimationFrame(() => {
            gsap.to(bubble, {
                opacity: 1, scale: 1, duration: 0.35, ease: 'back.out(1.5)',
                onComplete: () => {
                    if (duration > 0) {
                        setTimeout(() => {
                            gsap.to(bubble, { opacity: 0, scale: 0.8, duration: 0.25, onComplete: () => { bubble.remove(); resolve(); } });
                        }, duration);
                    } else {
                        resolve();
                    }
                }
            });
        });
    });
}

function clearBubbles() {
    activeBubbles.forEach(b => b.remove());
    activeBubbles = [];
}

function poofAt(el) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    for (let i = 0; i < 8; i++) {
        const p = document.createElement('div');
        p.className = 'poof-particle';
        p.style.left = cx + 'px';
        p.style.top = cy + 'px';
        const size = 10 + Math.random() * 15;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        document.body.appendChild(p);

        const angle = (i / 8) * Math.PI * 2;
        const dist = 20 + Math.random() * 25;
        gsap.fromTo(p, { opacity: 0.8, scale: 0.5 }, {
            x: Math.cos(angle) * dist,
            y: Math.sin(angle) * dist,
            opacity: 0, scale: 1.5,
            duration: 0.5 + Math.random() * 0.2,
            ease: 'power2.out',
            onComplete: () => p.remove()
        });
    }
}

// === 浮动数字 ===
function floatNumber(text, el, color = '#E74C3C') {
    const rect = el.getBoundingClientRect();
    const num = document.createElement('div');
    num.className = 'float-num';
    num.textContent = text;
    num.style.color = color;
    num.style.left = (rect.left + rect.width / 2) + 'px';
    num.style.top = (rect.top - 10) + 'px';
    document.body.appendChild(num);

    gsap.fromTo(num, { opacity: 1, y: 0 }, {
        y: -40, opacity: 0, duration: 1, ease: 'power2.out',
        onComplete: () => num.remove()
    });
}

// === 脚数指示器 ===
function showLegsHud(cur, target) {
    const hud = document.getElementById('legs-hud');
    hud.style.display = 'block';
    document.getElementById('legs-cur').textContent = cur;
    document.getElementById('legs-tgt').textContent = target;
    const valEl = document.getElementById('legs-cur');
    valEl.style.color = cur === target ? '#2ECC71' : '#E74C3C';
    gsap.fromTo(valEl, { scale: 1.3 }, { scale: 1, duration: 0.3, ease: 'back.out(2)' });
}
function hideLegsHud() { document.getElementById('legs-hud').style.display = 'none'; }

// === 替换动画 ===
async function replaceWithRabbit(index) {
    const animal = currentAnimals[index];
    const el = animal.el;

    // Squash准备
    gsap.to(el, { scaleY: 0.7, scaleX: 1.3, duration: 0.1 });
    await delay(100);

    // 烟雾+消失
    poofAt(el);
    gsap.to(el, { opacity: 0, scale: 0, duration: 0.2 });
    await delay(250);

    // 替换为兔子
    el.className = 'animal-char rabbit-char';
    el.innerHTML = RABBIT_SVG;
    el.style.animationDelay = `${Math.random() * 0.5}s`;
    currentAnimals[index].type = 'rabbit';

    // 从上方弹入
    gsap.fromTo(el,
        { opacity: 0, scale: 0.3, y: -30 },
        { opacity: 1, scale: 1, y: 0, duration: 0.45, ease: 'bounce.out' }
    );
    await delay(200);


    floatNumber('+2', el, '#2ECC71');
}

// ============================================================
// === 交互系统 ===
// ============================================================
const TOTAL_STEPS = 8;
const progressBar = document.getElementById('progress-bar');
const interactPanel = document.getElementById('interact-panel');
const magicZone = document.getElementById('magic-zone');
const dragHint = document.getElementById('drag-hint');

// 初始化进度条圆点
(function initProgress() {
    for (let i = 0; i < TOTAL_STEPS; i++) {
        const dot = document.createElement('div');
        dot.className = 'progress-dot';
        dot.dataset.step = i;
        progressBar.appendChild(dot);
    }
})();

function updateProgress(step) {
    progressBar.classList.add('visible');
    progressBar.querySelectorAll('.progress-dot').forEach((dot, i) => {
        dot.className = 'progress-dot';
        if (i < step) dot.classList.add('done');
        else if (i === step) dot.classList.add('active');
    });
}

function hideProgress() {
    progressBar.classList.remove('visible');
}

function showPanel() { interactPanel.classList.add('visible'); }
function hidePanel() { interactPanel.classList.remove('visible'); interactPanel.innerHTML = ''; }

// --- 等待点击继续 ---
function waitForTap(text = '继续 →') {
    return new Promise(resolve => {
        hidePanel();
        const btn = document.createElement('button');
        btn.className = 'interact-btn primary';
        btn.textContent = text;
        interactPanel.appendChild(btn);
        showPanel();
        btn.onclick = () => {
            AudioManager.playSfx('click');
            hidePanel();
            resolve();
        };
    });
}

// --- 逐个点击放鸡入笼 ---
function waitForPlaceChickens(count) {
    return new Promise(resolve => {
        hidePanel();
        let placed = 0;
        const counter = document.createElement('div');
        counter.className = 'interact-counter';
        counter.textContent = `已放入 ${placed} / ${count} 只`;

        const btn = document.createElement('button');
        btn.className = 'interact-btn primary';
        btn.textContent = '🐔 放入一只鸡';
        btn.onclick = () => {
            placed++;
            AudioManager.playSfx('pop');
            addChicken();
            counter.textContent = `已放入 ${placed} / ${count} 只`;
            if (placed >= count) {
                btn.style.pointerEvents = 'none';
                btn.style.opacity = '0.5';
                AudioManager.playSfx('ding');
                counter.textContent = `✓ 全部放好了！共 ${count} 只`;
                setTimeout(() => { hidePanel(); resolve(); }, 600);
            }
        };
        interactPanel.appendChild(btn);
        interactPanel.appendChild(counter);
        showPanel();
    });
}

// --- 点击动物数脚 ---
function waitForCountLegs(count) {
    return new Promise(resolve => {
        hidePanel();
        let counted = 0;
        let total = 0;
        const counter = document.createElement('div');
        counter.className = 'interact-counter';
        counter.textContent = `点击每只鸡数脚！已数 ${counted}/${count} 只，脚数: ${total}`;
        interactPanel.appendChild(counter);
        showPanel();

        // 给每只鸡添加点击事件
        currentAnimals.forEach((a, idx) => {
            if (a.type === 'chicken' && !a._counted) {
                a.el.style.cursor = 'pointer';
                const handler = () => {
                    if (a._counted) return;
                    a._counted = true;
                    counted++;
                    total += 2;
                    AudioManager.playSfx('pop');
                    floatNumber('+2', a.el, '#2ECC71');
                    gsap.fromTo(a.el, { scale: 1.2 }, { scale: 1, duration: 0.3, ease: 'back.out(2)' });
                    a.el.style.cursor = 'default';
                    counter.textContent = `已数 ${counted}/${count} 只，脚数: ${total}`;
                    showLegsHud(total, legs);

                    if (counted >= count) {
                        AudioManager.playSfx('ding');
                        counter.textContent = `✓ 共 ${total} 只脚！`;
                        setTimeout(() => { hidePanel(); resolve(total); }, 600);
                    }
                };
                a.el.addEventListener('click', handler, { once: true });
                a._countHandler = handler;
            }
        });
    });
}

// --- 滑块选兔子数 ---
function waitForSlider(max, correctVal, label) {
    return new Promise(resolve => {
        hidePanel();
        const wrap = document.createElement('div');
        wrap.className = 'interact-slider-wrap';

        const valDisplay = document.createElement('div');
        valDisplay.className = 'interact-slider-val';
        valDisplay.textContent = '0';

        const labelEl = document.createElement('div');
        labelEl.className = 'interact-counter';
        labelEl.textContent = label;

        const slider = document.createElement('input');
        slider.type = 'range';
        slider.min = '0';
        slider.max = String(max);
        slider.value = '0';
        slider.oninput = () => { valDisplay.textContent = slider.value; };

        const confirmBtn = document.createElement('button');
        confirmBtn.className = 'interact-btn primary';
        confirmBtn.textContent = '确定!';
        confirmBtn.onclick = () => {
            const val = parseInt(slider.value);
            if (val === correctVal) {
                AudioManager.playSfx('ding');
                confirmBtn.classList.add('correct');
                setTimeout(() => { hidePanel(); resolve(val); }, 600);
            } else {
                AudioManager.playSfx('pop');
                confirmBtn.classList.add('wrong');
                labelEl.textContent = val < correctVal ? '再多一点...' : '太多了...';
                setTimeout(() => { confirmBtn.classList.remove('wrong'); }, 400);
            }
        };

        wrap.appendChild(labelEl);
        wrap.appendChild(valDisplay);
        wrap.appendChild(slider);
        interactPanel.appendChild(wrap);
        interactPanel.appendChild(confirmBtn);
        showPanel();
    });
}

// --- 拖拽变身 ---
function waitForDragTransform(count) {
    return new Promise(resolve => {
        let remaining = count;
        document.getElementById('drag-remain').textContent = remaining;
        dragHint.classList.add('visible');
        magicZone.classList.add('visible');
        stage.classList.add('drag-mode');

        // 标记所有鸡为可拖拽
        currentAnimals.forEach((a, idx) => {
            if (a.type === 'chicken') {
                a.el.classList.add('draggable');
                setupDrag(a.el, idx);
            }
        });

        function setupDrag(el, idx) {
            let startX, startY, isDragging = false;
            let origRect = null;

            function onStart(e) {
                if (currentAnimals[idx].type !== 'chicken') return;
                e.preventDefault();
                e.stopPropagation();
                isDragging = true;
                el.classList.add('dragging');
                document.getElementById('scene').classList.add('drag-active');
                const pos = getPos(e);
                startX = pos.x;
                startY = pos.y;
                origRect = el.getBoundingClientRect();
            }

            function onMove(e) {
                if (!isDragging) return;
                e.preventDefault();
                const pos = getPos(e);
                const dx = pos.x - startX;
                const dy = pos.y - startY;
                el.style.transform = `translate(${dx}px, ${dy}px)`;
                // 检查是否在魔法圈内
                const elRect = el.getBoundingClientRect();
                const zoneRect = magicZone.getBoundingClientRect();
                if (isOverlapping(elRect, zoneRect)) {
                    magicZone.classList.add('highlight');
                } else {
                    magicZone.classList.remove('highlight');
                }
            }

            function onEnd(e) {
                if (!isDragging) return;
                isDragging = false;
                el.classList.remove('dragging');
                document.getElementById('scene').classList.remove('drag-active');
                const elRect = el.getBoundingClientRect();
                const zoneRect = magicZone.getBoundingClientRect();

                if (isOverlapping(elRect, zoneRect) && currentAnimals[idx].type === 'chicken') {
                    // 成功！变身
                    el.style.transform = '';
                    magicZone.classList.remove('highlight');
                    doTransform(idx);
                } else {
                    // 弹回
                    magicZone.classList.remove('highlight');
                    gsap.to(el, { x: 0, y: 0, duration: 0.3, ease: 'back.out(1.5)', onComplete: () => {
                        el.style.transform = '';
                    }});
                }
            }

            el.addEventListener('mousedown', onStart);
            el.addEventListener('touchstart', onStart, { passive: false });
            document.addEventListener('mousemove', onMove);
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchend', onEnd);

            // 存储清理函数
            el._dragCleanup = () => {
                el.removeEventListener('mousedown', onStart);
                el.removeEventListener('touchstart', onStart);
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('mouseup', onEnd);
                document.removeEventListener('touchend', onEnd);
            };
        }

        async function doTransform(idx) {
            AudioManager.playSfx('whoosh');
            await replaceWithRabbit(idx);
            const curLegs = countLegs();
            AudioManager.playSfx('ding');
            showLegsHud(curLegs, legs);
            remaining--;
            document.getElementById('drag-remain').textContent = remaining;

            if (remaining <= 0) {
                // 完成！清理
                cleanupDrag();
                dragHint.classList.remove('visible');
                magicZone.classList.remove('visible');
                resolve();
            }
        }

        function countLegs() {
            let total = 0;
            currentAnimals.forEach(a => { total += a.type === 'rabbit' ? 4 : 2; });
            return total;
        }

        function cleanupDrag() {
            stage.classList.remove('drag-mode');
            currentAnimals.forEach(a => {
                a.el.classList.remove('draggable');
                if (a.el._dragCleanup) { a.el._dragCleanup(); a.el._dragCleanup = null; }
            });
        }

        function getPos(e) {
            const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX, y: t.clientY };
        }

        function isOverlapping(r1, r2) {
            return !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);
        }
    });
}

// ============================================================
// === 主解题动画（交互式） ===
// ============================================================
async function runSolve() {
    if (isAnimating) return;
    isAnimating = true;
    document.getElementById('play-btn').disabled = true;
    document.getElementById('game-hud').classList.add('hidden');
    document.getElementById('reset-hud').style.display = 'block';

    AudioManager.init();
    AudioManager.startBGM();

    const result = solve(heads, legs);
    if (!result) {
        await showBubble(`<span class="highlight">无解！</span><br>请调整参数再试试`, { pos: 'center', duration: 2000 });
        resetAll();
        return;
    }

    const extra = legs - heads * 2;
    clearStage();
    clearBubbles();

    // ========== 步骤1: 标题 ==========
    updateProgress(0);
    AudioManager.playSfx('pop');
    await showBubble(`<span class="title-text">鸡兔同笼</span><br><span class="sub-text">经典趣味挑战</span>`, { pos: 'top', big: true });
    await AudioManager.speak('01_title');
    await waitForTap('准备好了!');
    clearBubbles();

    // ========== 步骤2: 出题 ==========
    updateProgress(1);
    AudioManager.playSfx('pop');
    await showBubble(`笼子里有 <span class="highlight">${heads} 个头</span>，<span class="highlight">${legs} 只脚</span><br>鸡有2只脚，兔有4只脚<br>各有多少只呢？`, { pos: 'top' });
    for (let i = 0; i < heads; i++) addQuestion();
    await AudioManager.speak('02_question');
    await waitForTap('开始解题');
    clearBubbles();

    // ========== 步骤3: 放鸡入笼 ==========
    updateProgress(2);
    AudioManager.playSfx('pop');
    await showBubble(`<b>假设法</b>：先假设全是鸡！<br>把 ${heads} 只鸡放入笼子吧`, { pos: 'top' });
    await AudioManager.speak('03_assume');
    clearStage();
    await waitForPlaceChickens(heads);
    showLegsHud(heads * 2, legs);
    clearBubbles();

    // ========== 步骤4: 点击数脚 ==========
    updateProgress(3);
    AudioManager.playSfx('pop');
    await showBubble(`点击每只鸡来数脚吧！<br><span class="sub-text">每只鸡有 2 只脚</span>`, { pos: 'top' });
    await waitForCountLegs(heads);
    await AudioManager.speak('04_count');
    clearBubbles();

    await showBubble(`如果全是鸡：<span class="formula">${heads} × 2 = ${heads * 2} 只脚</span><br>但实际有 <span class="highlight">${legs} 只脚</span><br>多了 <span class="highlight">${extra} 只脚</span>！`, { pos: 'top' });
    await waitForTap('明白了');
    clearBubbles();

    // ========== 步骤5: 推理讲解 ==========
    updateProgress(4);
    AudioManager.playSfx('pop');
    await showBubble(`每把1只鸡换成兔子<br>脚就 <span class="accent">+2</span>（因为 4−2=2）`, { pos: 'top' });
    await AudioManager.speak('05_reason');
    await waitForTap('了解了');
    clearBubbles();

    // ========== 步骤6: 滑块选兔子数 ==========
    updateProgress(5);
    AudioManager.playSfx('pop');
    await showBubble(`多了 <span class="highlight">${extra} 只脚</span>，每换1只多2只脚<br>拖动滑块选择要换几只？`, { pos: 'top' });
    await waitForSlider(heads, result.rabbits, `${extra} ÷ 2 = ? 只兔子`);
    clearBubbles();

    await showBubble(`需要替换：<span class="formula">${extra} ÷ 2 = ${result.rabbits} 只</span>`, { pos: 'top' });
    await waitForTap('开始变身!');
    clearBubbles();

    // ========== 步骤7: 拖拽变身 ==========
    updateProgress(6);
    AudioManager.playSfx('pop');
    await showBubble(`<b>拖动 ${result.rabbits} 只鸡到魔法圈变身！</b>`, { pos: 'top' });
    await AudioManager.speak('06_transform');
    await waitForDragTransform(result.rabbits);
    await delay(500);
    clearBubbles();

    // ========== 步骤8: 结果+验证+总结 ==========
    updateProgress(7);
    AudioManager.playSfx('tada');
    await showBubble(`<b>🎉 答案揭晓！</b><br>鸡 = <span class="highlight">${result.chickens} 只</span> &nbsp; 兔 = <span class="accent">${result.rabbits} 只</span>`, { pos: 'top', big: true });
    celebrate();
    await AudioManager.speak('07_result');
    await waitForTap('验证一下');
    clearBubbles();

    AudioManager.playSfx('pop');
    await showBubble(`<b>验证一下</b><br>头：${result.chickens}+${result.rabbits} = ${heads} ✓<br>脚：${result.chickens}×2+${result.rabbits}×4 = ${legs} ✓`, { pos: 'top' });
    await AudioManager.speak('08_verify');
    await waitForTap('看总结');
    clearBubbles();

    AudioManager.playSfx('pop');
    await showBubble(`<b>解法总结</b><br><span class="formula">兔 = (脚数 − 头数×2) ÷ 2</span><br><span class="formula">鸡 = 头数 − 兔数</span><br><br>口诀：多出的脚÷2 = 兔子数`, { pos: 'center' });
    await AudioManager.speak('09_summary');
    await waitForTap('🎉 学会了!');
    clearBubbles();

    // 完成
    hideProgress();
    AudioManager.stopBGM();
    isAnimating = false;
    document.getElementById('play-btn').disabled = false;
}

// === 重置 ===
function resetAll() {
    isAnimating = false;
    AudioManager.stopNarration();
    AudioManager.stopBGM();
    hidePanel();
    hideProgress();
    dragHint.classList.remove('visible');
    magicZone.classList.remove('visible');
    magicZone.classList.remove('highlight');
    // 清理拖拽
    stage.classList.remove('drag-mode');
    currentAnimals.forEach(a => {
        a.el.classList.remove('draggable', 'dragging');
        if (a.el._dragCleanup) { a.el._dragCleanup(); a.el._dragCleanup = null; }
    });
    document.getElementById('play-btn').disabled = false;
    document.getElementById('game-hud').classList.remove('hidden');
    document.getElementById('reset-hud').style.display = 'none';
    hideLegsHud();
    clearBubbles();
    clearStage();
    showInitial();
}

// === 初始画面 ===
function showInitial() {
    clearStage();
    clearBubbles();
    showBubble(`<span class="title-text">鸡兔同笼</span><br>笼中有 <span class="highlight">${heads} 个头</span>，<span class="highlight">${legs} 只脚</span><br><span class="sub-text">调整参数，点击「开始挑战」</span>`, { pos: 'center' });
    for (let i = 0; i < Math.min(heads, 12); i++) addQuestion();
}

// === HUD 事件 ===
document.getElementById('h-minus').onclick = () => { AudioManager.init(); AudioManager.playSfx('click'); if (heads > 2 && !isAnimating) { heads--; syncHUD(); } };
document.getElementById('h-plus').onclick = () => { AudioManager.init(); AudioManager.playSfx('click'); if (heads < 20 && !isAnimating) { heads++; syncHUD(); } };
document.getElementById('l-minus').onclick = () => { AudioManager.init(); AudioManager.playSfx('click'); if (legs > heads*2 && !isAnimating) { legs -= 2; syncHUD(); } };
document.getElementById('l-plus').onclick = () => { AudioManager.init(); AudioManager.playSfx('click'); if (legs < heads*4 && !isAnimating) { legs += 2; syncHUD(); } };
document.getElementById('play-btn').onclick = () => { AudioManager.init(); AudioManager.playSfx('click'); runSolve(); };
document.getElementById('reset-btn').onclick = () => { AudioManager.init(); AudioManager.playSfx('click'); resetAll(); };

function syncHUD() {
    if (legs < heads * 2) legs = heads * 2;
    if (legs > heads * 4) legs = heads * 4;
    if (legs % 2 !== 0) legs--;
    document.getElementById('h-val').textContent = heads;
    document.getElementById('l-val').textContent = legs;
    showInitial();
}

// === 栅栏生成 ===
function buildFence() {
    const fence = document.getElementById('fence');
    const w = fence.offsetWidth;
    const posts = Math.floor(w / 30);
    const rails = fence.querySelectorAll('.fence-rail');
    fence.innerHTML = '';
    rails.forEach(r => fence.appendChild(r));
    for (let i = 0; i < posts; i++) {
        const post = document.createElement('div');
        post.className = 'fence-post';
        fence.appendChild(post);
    }
}

// === 初始化 ===
buildFence();
showInitial();
